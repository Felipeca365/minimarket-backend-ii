spring.application.name=minimarket
# Configuración de H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Configuración de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
# IMPORTANTE: en un ambiente real este secreto NO debe ir en el repositorio,
# se maneja como variable de entorno. Para la EFT se deja aquí para que sea
# reproducible al evaluar el proyecto.
jwt.secret=minimarketPlusClaveSecretaJWT2026SuperSeguraParaFirmarTokens
jwt.expiration-ms=3600000
